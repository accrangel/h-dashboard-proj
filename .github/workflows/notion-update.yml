name: Atualizar Notion

on:
  workflow_dispatch:
    inputs:
      page_id:
        description: 'ID da página no Notion'
        required: true
      status:
        description: 'Novo status'
        required: false
      project:
        description: 'Novo projeto/categoria'
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Atualizar página no Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request

          page_id = "${{ github.event.inputs.page_id }}"
          status = "${{ github.event.inputs.status }}"
          project = "${{ github.event.inputs.project }}"
          token = os.environ['NOTION_TOKEN']

          props = {}
          if status:
              props['Status'] = {'status': {'name': status}}
          if project:
              props['Projeto'] = {'select': {'name': project}}

          if not props:
              print("Nada para atualizar")
              exit(0)

          url = f'https://api.notion.com/v1/pages/{page_id}'
          data = json.dumps({'properties': props}).encode()
          req = urllib.request.Request(url, data=data, method='PATCH')
          req.add_header('Authorization', f'Bearer {token}')
          req.add_header('Notion-Version', '2022-06-28')
          req.add_header('Content-Type', 'application/json')

          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())
              print(f"Atualizado: {result.get('id')}")
          PYEOF
