name: Atualizar Dashboard HOLSA

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Atualizar dados do Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python update_dashboard.py
        
      - name: Verificar mudancas
        run: |
          git diff --stat index.html
          echo "--- Primeiros 200 chars do MEETINGS no index.html ---"
          grep -o 'var MEETINGS = \[.\{0,200\}' index.html || echo "MEETINGS vazio ou nao encontrado"

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: atualiza dados do dashboard [skip ci]"
          git push
