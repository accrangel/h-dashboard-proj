name: Atualizar Dashboard HOLSA

on:
  schedule:
    - cron: '0 * * * *'  # toda hora
  workflow_dispatch:       # permite rodar manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Atualizar dashboard com dados do Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python update_dashboard.py

      - name: Commit e push se houver mudanças
        run: |
          git config user.name "HOLSA Bot"
          git config user.email "bot@holsa.com.br"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto: atualiza dashboard $(date '+%d/%m/%Y %H:%M')"
          git push
